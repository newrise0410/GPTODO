<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GPTODO</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <span class="brand">GPTODO</span>
    <span class="head-right">
      <span id="today" class="today"></span>
      <button id="clear" class="theme-btn" aria-label="대화 비우기" title="대화 기록 비우기">🗑</button>
      <button id="theme" class="theme-btn" aria-label="테마 전환" title="라이트/다크 전환">◐</button>
    </span>
  </header>

  <main id="chat" class="chat"></main>

  <!-- 빠른 메뉴 (§20) — data-cmd가 서버로 전송되는 정식 라벨 -->
  <nav class="menu" id="menu">
    <button data-cmd="☀️ 오늘">오늘</button>
    <button data-cmd="📅 이번 주">이번 주</button>
    <button data-cmd="🗓 이번 달">이번 달</button>
    <button data-cmd="📂 전체">전체</button>
    <i></i>
    <button data-cmd="🗂 분류하기">분류</button>
    <button data-cmd="📁 프로젝트">프로젝트</button>
    <button data-cmd="📊 대시보드">대시보드</button>
    <i></i>
    <button data-cmd="⭐ 중요">중요</button>
    <button data-cmd="⏰ 마감 임박">마감 임박</button>
    <button data-cmd="📝 날짜 미정">날짜 미정</button>
    <button data-cmd="⚠️ 확인 필요">확인 필요</button>
    <i></i>
    <button data-cmd="🔄 날짜 갱신" class="ghost">날짜 갱신</button>
  </nav>

  <form id="form" class="composer">
    <textarea id="input" rows="1" placeholder="입력…" autofocus></textarea>
    <button type="submit" id="send" aria-label="전송">↑</button>
  </form>

  <script src="/static/app.js"></script>
</body>
</html>
